name: lansenger-platform
label: Lansenger (蓝信)
kind: platform
version: 2.2.0
description: >
  Lansenger (蓝信) gateway adapter for Hermes Agent.
  Connects to Lansenger Smart Bot API via WebSocket long-connection for
  real-time message reception. Responses are sent via HTTP API.
  Supports text, Markdown (formatText), and file/image/video delivery.
author: Lansenger PM Team
requires_env:
  - name: LANSENGER_APP_ID
    description: "Lansenger Bot App ID"
    prompt: "Lansenger App ID"
    password: false
  - name: LANSENGER_APP_SECRET
    description: "Lansenger Bot App Secret"
    prompt: "Lansenger App Secret"
    password: true
optional_env:
  - name: LANSENGER_API_GATEWAY_URL
    description: "Lansenger API Gateway URL (default: https://open.e.lanxin.cn/open/apigw)"
    prompt: "API Gateway URL"
    password: false
  - name: LANSENGER_ALLOWED_USERS
    description: "Comma-separated Lansenger user IDs allowed to talk to the bot"
    prompt: "Allowed users (comma-separated)"
    password: false
  - name: LANSENGER_ALLOW_ALL_USERS
    description: "Allow any Lansenger user to talk to the bot (dev only)"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: LANSENGER_HOME_CHANNEL
    description: "Default chat ID for cron / notification delivery (auto-detected from first p2p message)"
    prompt: "Home channel (or empty for auto-detect)"
    password: false