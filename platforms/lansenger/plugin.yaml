name: lansenger-platform
label: Lansenger (蓝信)
kind: platform
version: 2.9.3
description: >
  Lansenger (蓝信) gateway adapter for Hermes Agent.
  Connects to Lansenger Bot API via WebSocket long-connection for
  real-time message reception. Responses are sent via HTTP API.
  Supports text, Markdown (formatText), and file/image/video delivery.
author: Lanxin Mobile (Beijing) Technology Co., ltd.
requires_env:
  - name: LANSENGER_APP_ID
    description: "Lansenger Bot App ID"
    prompt: "Lansenger App ID"
    password: false
  - name: LANSENGER_APP_SECRET
    description: "Lansenger Bot App Secret"
    prompt: "Lansenger App Secret"
    password: true
optional_env:
  - name: LANSENGER_API_GATEWAY_URL
    description: "Lansenger API Gateway URL (default: https://open.e.lanxin.cn/open/apigw)"
    prompt: "API Gateway URL"
    password: false
  - name: LANSENGER_ALLOWED_USERS
    description: "Comma-separated Lansenger user IDs allowed to talk to the bot"
    prompt: "Allowed users (comma-separated)"
    password: false
  - name: LANSENGER_ALLOW_ALL_USERS
    description: "Allow any Lansenger user to talk to the bot (dev only)"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: LANSENGER_HOME_CHANNEL
    description: "Default chat ID for cron / notification delivery (auto-detected from first p2p message)"
    prompt: "Home channel (or empty for auto-detect)"
    password: false
  - name: LANSENGER_HOOK_LOGGING
    description: "Enable/disable plugin hook logging (default: true)"
    prompt: "Hook logging enabled? (true/false)"
    password: false
  - name: LANSENGER_GROUP_POLICY
    description: "Group chat policy: open (all groups), allowlist (selected groups), disabled (no groups). Default: open"
    prompt: "Group policy (open/allowlist/disabled)"
    password: false
  - name: LANSENGER_GROUP_ALLOW_FROM
    description: "Comma-separated sender IDs allowed to trigger the bot in groups (sender-level whitelist, effective when groupPolicy=allowlist)"
    prompt: "Allowed senders in groups, comma-separated (or empty for any sender)"
    password: false
  - name: LANSENGER_REQUIRE_MENTION
    description: "Require @mention to trigger in groups (true/false, default: true). Can be overridden per-group in config.yaml extra.groups.<chatId>.require_mention"
    prompt: "Require @mention in groups? (true/false)"
    password: false
  - name: LANSENGER_RESPOND_TO_AT_ALL
    description: "Whether @all messages bypass require_mention (true/false, default: false). Can be overridden per-group in config.yaml extra.groups.<chatId>.respond_to_at_all"
    prompt: "Respond to @all in groups? (true/false)"
    password: false
  - name: LANSENGER_APPROVAL_ALLOW_FROM
    description: "Comma-separated sender IDs allowed to approve dangerous commands (besides the bot owner). Default: only owner can approve."
    prompt: "Additional approvers (comma-separated, or empty for owner-only)"
    password: false
# Per-group config: set in config.yaml platforms.lansenger.extra.groups:
# In allowlist mode, only groups listed in this map are allowed.
#   groups:
#     "group-chat-id-1":
#       enabled: false                # disable this group
#       require_mention: false        # override global require_mention
#       respond_to_at_all: false      # do not respond to @all when require_mention=true
#       allow_from: ["user-id-1"]     # restrict senders in this group