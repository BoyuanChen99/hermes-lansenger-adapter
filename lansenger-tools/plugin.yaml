name: lansenger-tools
version: 2.4.0
description: Lansenger messaging tools — send text/markdown/files/images, revoke messages, send linkCard cards
provides_tools:
  - lansenger_send_text
  - lansenger_send_markdown
  - lansenger_send_file
  - lansenger_send_image_url
  - lansenger_revoke_message
  - lansenger_send_link_card
requires_env:
  - name: LANSENGER_APP_ID
    description: "Lansenger (蓝信) bot App ID (from Contacts → Personal Bot)"
    secret: false
  - name: LANSENGER_APP_SECRET
    description: "Lansenger (蓝信) bot App Secret (from Contacts → Personal Bot)"
    secret: true
optional_env:
  - name: LANSENGER_API_GATEWAY_URL
    description: "Lansenger API Gateway URL (default: https://open.e.lanxin.cn/open/apigw)"
    secret: false