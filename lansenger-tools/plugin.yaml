name: lansenger-tools
version: 2.9.2
description: Lansenger messaging tools — send text/markdown/files/images, revoke messages, send linkCard/appArticles/appCard cards, update dynamic cards, query groups
author: Lanxin Mobile (Beijing) Technology Co., ltd.
provides_tools:
  - lansenger_send_text
  - lansenger_send_markdown
  - lansenger_send_file
  - lansenger_send_image_url
  - lansenger_revoke_message
  - lansenger_send_link_card
  - lansenger_send_app_articles
  - lansenger_send_app_card
  - lansenger_update_dynamic_card
  - lansenger_query_groups
requires_env:
  - name: LANSENGER_APP_ID
    description: "Lansenger (蓝信) bot App ID (from Contacts → Personal Bot)"
    prompt: "Lansenger App ID"
    password: false
  - name: LANSENGER_APP_SECRET
    description: "Lansenger (蓝信) bot App Secret (from Contacts → Personal Bot)"
    prompt: "Lansenger App Secret"
    password: true
optional_env:
  - name: LANSENGER_API_GATEWAY_URL
    description: "Lansenger API Gateway URL (default: https://open.e.lanxin.cn/open/apigw)"
    prompt: "API Gateway URL"
    password: false