name: lansenger-media-tools
version: 2.1.0
description: Lansenger (蓝信) file/image/video sending tools — send media to any user or group directly from the Agent
provides_tools:
  - lansenger_send_file
  - lansenger_send_image_url
requires_env:
  - name: LANSENGER_APP_ID
    description: "蓝信机器人 App ID (from 通讯录 → 个人机器人)"
    secret: false
  - name: LANSENGER_APP_SECRET
    description: "蓝信机器人 App Secret (from 通讯录 → 个人机器人)"
    secret: true
optional_env:
  - name: LANSENGER_API_GATEWAY_URL
    description: "蓝信 API Gateway URL (default: https://open.e.lanxin.cn/open/apigw)"
    secret: false