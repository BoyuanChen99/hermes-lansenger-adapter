name: lansenger-media-tools
version: 2.1.0
description: Lansenger (蓝信) message, media, and management tools — send text/markdown/files/images, revoke messages, send linkCard cards
provides_tools:
  - lansenger_send_text
  - lansenger_send_markdown
  - lansenger_send_file
  - lansenger_send_image_url
  - lansenger_revoke_message
  - lansenger_send_link_card
requires_env:
  - name: LANSENGER_APP_ID
    description: "蓝信机器人 App ID (from 通讯录 → 个人机器人)"
    secret: false
  - name: LANSENGER_APP_SECRET
    description: "蓝信机器人 App Secret (from 通讯录 → 个人机器人)"
    secret: true
optional_env:
  - name: LANSENGER_API_GATEWAY_URL
    description: "蓝信 API Gateway URL (default: https://open.e.lanxin.cn/open/apigw)"
    secret: false